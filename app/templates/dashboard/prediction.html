{% extends "layout/base.html" %} {% block css %}
<link
  rel="stylesheet"
  href="{{ url_for('static', filename='css/dashboard.css') }}"
/>
{% endblock %} {% block title %}Disease Prediction{% endblock %} {% block
content %}

<section class="dashboard-hero">
  <div class="container">
    <div class="row align-items-center">
      <div class="col-lg-6">
        <h1>Disease Prediction</h1>

        <p>
          Enter patient symptoms and let our AI predict the most probable
          disease.
        </p>
      </div>

      <div class="col-lg-6 text-center">
        <img
          src="{{ url_for('static', filename='images/icons/prediction.svg') }}"
          class="dashboard-svg"
          alt="Prediction"
        />
      </div>
    </div>
  </div>
</section>

<section class="container py-5">
  <div class="prediction-form">
    <form>
      <div class="row g-4">
        <div class="col-md-6">
          <label>Age</label>
          <input type="number" class="form-control" />
        </div>

        <div class="col-md-6">
          <label>Gender</label>
          <select class="form-select">
            <option>Male</option>
            <option>Female</option>
          </select>
        </div>

        <div class="col-md-6">
          <label>Fever</label>
          <select class="form-select">
            <option>No</option>
            <option>Yes</option>
          </select>
        </div>

        <div class="col-md-6">
          <label>Cough</label>
          <select class="form-select">
            <option>No</option>
            <option>Yes</option>
          </select>
        </div>

        <div class="col-md-6">
          <label>Headache</label>
          <select class="form-select">
            <option>No</option>
            <option>Yes</option>
          </select>
        </div>

        <div class="col-md-6">
          <label>Fatigue</label>
          <select class="form-select">
            <option>No</option>
            <option>Yes</option>
          </select>
        </div>
      </div>

      <button class="btn btn-primary-custom mt-4">Predict Disease</button>
    </form>
  </div>
</section>

{% endblock %}
